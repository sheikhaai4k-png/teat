<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valo Dhofar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700;800&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'IBM Plex Sans Arabic', sans-serif; }

    body { background: #F7FAF8; display: flex; justify-content: center; }

    .app {
      max-width: 420px;
      width: 100%;
      background: #F7FAF8;
      min-height: 100vh;
      overflow: hidden;
    }

    .header {
      position: relative;
      width: 100%;
      height: 237px;
      overflow: hidden;
      border-radius: 0 0 30px 30px;
    }

    .header-img {
      position: absolute;
      inset: 0;
      background: url('assets/images/header2.png') center/cover no-repeat;
      transform: scale(1.25);
    }

    .header-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
    }

    .header-content {
      position: relative;
      z-index: 2;
      padding: 18px 20px 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      /* ✅ FIX: header-top لا يتأثر بتغيير dir - دائماً من اليمين لليسار */
      direction: ltr;
    }

    /* ✅ FIX: back-btn دائماً على اليسار بدون position:absolute */
    .controls-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .greeting-text { display:flex; flex-direction:column; align-items:flex-end; line-height:1.3; }
    .greeting-hey { font-size:11px; font-weight:500; color:rgba(255,255,255,0.80); }
    .greeting-name { font-size:15px; font-weight:800; color:#fff; }
    

    .glass-card {
      margin-top: auto;
      margin-bottom: 18px;
      width: 100%;
      padding: 18px;
      background: rgba(255,255,255,0.28);
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.38);
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      /* ✅ FIX: glass-card نصه يتبع اتجاه الصفحة */
    }

    .glass-title {
      font-size: clamp(18px, 4vw, 22px);
      font-weight: 800;
      color: #fff;
      line-height: 1.2;
    }

    .glass-sub {
      font-size: clamp(12px, 2.5vw, 13px);
      color: #fff;
      font-weight: 500;
      margin-top: 8px;
      line-height: 1.6;
    }

    /* ── Stats ── */
    .hero-stats {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .stat-number {
      font-size: 18px;
      font-weight: 800;
      color: #ffffff;
    }

    .stat-label {
      font-size: 10px;
      color: rgba(255,255,255,0.75);
      margin-top: 2px;
    }

    .stat-divider {
      width: 1px;
      height: 28px;
      background: rgba(255, 255, 255, 0.2);
    }

    .grid-area {
      padding: 18px 20px;
    }

    /* ── Currency Dropdown ── */
    .currency-dropdown {
      position: relative;
    }

    .currency-btn {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 4px 10px;
      border-radius: 16px;
      font-size: 11px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      backdrop-filter: blur(10px);
      white-space: nowrap;
    }

    .currency-menu {
      position: absolute;
      top: 35px;
      left: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      display: none;
      min-width: 70px;
      animation: fadeIn 0.2s ease;
      z-index: 100;
    }

    .currency-menu div {
      padding: 8px;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      color: #333;
    }

    .currency-menu div:hover {
      background: rgba(0,0,0,0.05);
    }

    /* ── Language Switch ── */
    .lang-switch {
      position: relative;
      width: 70px;
      height: 28px;
      display: inline-block;
      flex-shrink: 0;
    }

    .lang-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .lang-switch .slider {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.25);
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      overflow: hidden;
    }

    .lang-switch .text {
      z-index: 2;
      transition: 0.3s;
    }

    .lang-switch .slider::before {
      content: "";
      position: absolute;
      height: 22px;
      width: 22px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.3s;
      z-index: 1;
    }

    .lang-switch input:checked + .slider {
      background: rgba(255,255,255,0.25);
    }

    .lang-switch input:checked + .slider::before {
      transform: translateX(42px);
    }

    .lang-switch input:checked + .slider .ar {
      opacity: 0.4;
    }

    .lang-switch input:not(:checked) + .slider .en {
      opacity: 0.4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Cards ── */
    .card-item {
      background: transparent;
      border-radius: 20px;
      padding: 10px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.15s, background 0.15s;
      border: none !important;
    }

    .card-item:hover {
      background: rgba(0,109,68,0.07);
      transform: scale(1.02);
    }

    .card-item:active {
      transform: scale(0.97);
    }

    .card-img-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 18px;
      overflow: hidden;
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .card-label {
      margin-top: 10px;
      font-size: clamp(12px, 2.5vw, 14px);
      font-weight: 700;
      color: #161D1F;
      text-align: center;
      line-height: 1.3;
    }

    /* ✅ FIX: Responsive - app يأخذ عرض الجهاز كاملاً */
    @media (min-width: 768px) {
      .app {
        max-width: 100%;
      }

      .header {
        height: 320px;
      }

      .glass-title {
        font-size: 32px;
      }

      .glass-sub {
        font-size: 16px;
      }

      .glass-card {
        padding: 24px;
      }

      

      .col-6 {
        flex: 0 0 33.333% !important;
        max-width: 33.333% !important;
      }
    }

    @media (min-width: 1024px) {
      .app {
        max-width: 900px;
        margin: 0 auto;
      }

      .header {
        height: 380px;
      }

      .glass-title {
        font-size: 38px;
      }

      .glass-sub {
        font-size: 18px;
      }

      .col-6 {
        flex: 0 0 33.333% !important;
        max-width: 33.333% !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">

    <div class="header">
      <div class="header-img"></div>
      <div class="header-overlay"></div>
      <div class="header-content">

        <!-- ✅ header-top دائماً direction:ltr حتى لا يتأثر بتغيير اللغة -->
        <div class="header-top">

          <!-- الكونترولز على اليمين دائماً -->
          <div class="controls-left">

            <!-- Back arrow -->
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" style="cursor:pointer;">
              <polyline points="15 18 9 12 15 6"/>
            </svg>

            <!-- Currency -->
            <div class="currency-dropdown">
              <div class="currency-btn" onclick="toggleCurrencyDropdown()">
                <span id="selectedCurrency">OMR</span>
                ▼
              </div>
              <div class="currency-menu" id="currencyMenu">
                <div onclick="selectCurrency('OMR')">OMR</div>
                <div onclick="selectCurrency('AED')">AED</div>
                <div onclick="selectCurrency('SAR')">SAR</div>
                <div onclick="selectCurrency('QAR')">QAR</div>
                <div onclick="selectCurrency('KWD')">KWD</div>
              </div>
            </div>

            <!-- Language Switch -->
            <label class="lang-switch">
              <input type="checkbox" id="langToggle">
              <span class="slider">
                <span class="text ar">AR</span>
                <span class="text en">EN</span>
              </span>
            </label>

          </div>

          <!-- اسم المستخدم -->
          <span class="greeting-name" id="greetingName">حياك شيخه</span>

        </div>

        <!-- Glass Card -->
        <div class="glass-card">
          <div class="glass-title" id="mainTitle">صيف ظفار مع ڤـالو 🌿</div>
          <div class="glass-sub" id="mainSub">
            اكتشفي أجمل أماكن الإقامة والمنتجعات والرحلات في ظفار بكل سهولة.
          </div>

          <!-- Stats -->
          <div class="hero-stats">
            <div class="stat-item">
              <span class="stat-number">+50</span>
              <span class="stat-label" data-key="statPlaces">مكان</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-number">4.8</span>
              <span class="stat-label" data-key="statRating">تقييم</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-number">100%</span>
              <span class="stat-label" data-key="statSatisfy">رضا</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="grid-area">
      <div class="row g-3">

        <div class="col-6">
          <div class="card-item" onclick="navigate('resorts.html')">
            <div class="card-img-wrap">
              <img src="assets/images/hotResorts.png" alt="Hot Resorts"/>
            </div>
            <div class="card-label" data-key="resorts">فنادق و منتجعات</div>
          </div>
        </div>

        <div class="col-6">
          <div class="card-item" onclick="navigate('chalets.html')">
            <div class="card-img-wrap">
              <img src="assets/images/chaletsBakes.png" alt="Chalets & Breaks"/>
            </div>
            <div class="card-label" data-key="chalets">شاليهات و مخيمات</div>
          </div>
        </div>

        <div class="col-6">
          <div class="card-item" onclick="navigate('rooms.html')">
            <div class="card-img-wrap">
              <img src="assets/images/roomsApts.png" alt="Rooms & Apartments"/>
            </div>
            <div class="card-label" data-key="rooms">غرف و شقق</div>
          </div>
        </div>

        <div class="col-6">
          <div class="card-item" onclick="navigate('caravans.html')">
            <div class="card-img-wrap">
              <img src="assets/images/caravansCabins.png" alt="Caravans & Cabins"/>
            </div>
            <div class="card-label" data-key="caravans">كرفانات و أكواخ</div>
          </div>
        </div>

        <div class="col-6">
          <div class="card-item" onclick="navigate('dhofar.html')">
            <div class="card-img-wrap">
              <img src="assets/images/staydh.png" alt="Stay Dhofar"/>
            </div>
            <div class="card-label" data-key="buffets">بوفهيات</div>
          </div>
        </div>

        <div class="col-6">
          <div class="card-item" onclick="navigate('add-property.html')">
            <div class="card-img-wrap">
              <img src="assets/images/addprop.png" alt="Add Property"/>
            </div>
            <div class="card-label" data-key="addprop">سجل عقارك الان</div>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>

    /* ── Currency ── */
    function toggleCurrencyDropdown() {
      const menu = document.getElementById("currencyMenu");
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    }

    function selectCurrency(currency) {
      document.getElementById("selectedCurrency").innerText = currency;
      localStorage.setItem("currency", currency);
      document.getElementById("currencyMenu").style.display = "none";
    }

    document.addEventListener("click", function(e) {
      if (!e.target.closest(".currency-dropdown")) {
        document.getElementById("currencyMenu").style.display = "none";
      }
    });

    /* ── Navigate ── */
    const categories = {
      ar: {
        'caravans.html'     : 'كرفانات و أكواخ',
        'chalets.html'      : 'شاليهات و مخيمات',
        'resorts.html'      : 'فنادق و منتجعات',
        'rooms.html'        : 'غرف و شقق',
        'dhofar.html'       : 'بوفهيات',
        'add-property.html' : 'سجل عقارك الان',
      },
      en: {
        'caravans.html'     : 'Caravans & Cabins',
        'chalets.html'      : 'Chalets & Camps',
        'resorts.html'      : 'Hotels & Resorts',
        'rooms.html'        : 'Rooms & Apartments',
        'dhofar.html'       : 'Buffets',
        'add-property.html' : 'List Your Property',
      }
    };

    function navigate(page) {
      const lang = document.documentElement.lang === 'en' ? 'en' : 'ar';
      const cat = categories[lang][page];
      window.location.href = `search.html?category=${encodeURIComponent(cat)}`;
    }

    /* ── Translations ── */
    const translations = {
      ar: {
        title   : "صيف ظفار مع ڤـالو 🌿",
        sub     : "اكتشفي أجمل أماكن الإقامة والمنتجعات والرحلات في ظفار بكل سهولة.",
        resorts : "فنادق و منتجعات",
        chalets : "شاليهات و مخيمات",
        rooms   : "غرف و شقق",
        caravans: "كرفانات و أكواخ",
        buffets : "بوفهيات",
        addprop : "سجل عقارك الان",
        statPlaces: "مكان",
        statRating: "تقييم",
        statSatisfy: "رضا",
      },
      en: {
        title   : "Dhofar Summer with Valo 🌿",
        sub     : "Discover the best stays, resorts and trips in Dhofar easily.",
        resorts : "Hotels & Resorts",
        chalets : "Chalets & Camps",
        rooms   : "Rooms & Apartments",
        caravans: "Caravans & Cabins",
        buffets : "Buffets",
        addprop : "List Your Property",
        statPlaces: "Places",
        statRating: "Rating",
        statSatisfy: "Satisfaction",
      }
    };

    function applyLanguage(lang) {
      const t = translations[lang];

      /* ✅ FIX: تغيير اتجاه الصفحة كاملاً */
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';

      /* ✅ FIX: تغيير نصوص الهيدر */
      document.getElementById("mainTitle").innerText = t.title;
      document.getElementById("mainSub").innerText = t.sub;

      /* ✅ FIX: تغيير نصوص كل البطاقات */
      /* تحديث الترحيب */
      document.getElementById("greetingName").innerText = greetingTr[lang].name;

      document.querySelectorAll("[data-key]").forEach(el => {
        const key = el.getAttribute("data-key");
        if (t[key]) el.innerText = t[key];
      });
    }

    /* ── Greeting translations ── */
    const greetingTr = {
      ar: { name: 'حياك شيخه' },
      en: { name: 'Hayak Shaikha' }
    };

    document.getElementById("langToggle").addEventListener("change", function () {
      applyLanguage(this.checked ? 'en' : 'ar');
    });

    /* Init: استعادة العملة المحفوظة */
    const savedCurrency = localStorage.getItem("currency");
    if (savedCurrency) document.getElementById("selectedCurrency").innerText = savedCurrency;

  </script>
</body>
</html>
